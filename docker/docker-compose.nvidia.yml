# ==================================================================
# NVIDIA GPU Override
#
# Gunakan file ini bersama docker-compose.yml jika menggunakan GPU NVIDIA:
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.nvidia.yml up
#
# Membutuhkan: NVIDIA Container Toolkit
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# ==================================================================

services:
  ros-core:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, display, video, compute, utility]
