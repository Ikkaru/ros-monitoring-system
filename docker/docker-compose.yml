# ==================================================================
# ROS 2 Monitoring Service
#
# Servies:
#   ros-core → ROS 2 core services (e.g., roscore)
#
# Usage:
# docker-compose up -d
#        → http://localhost:6080 (noVNC/GUI)
#        → http://localhost:8765 (Foxglove)
#        → http://localhost:5000 (File Manager)
# ==================================================================

services:

  # ── ROS2 Core Container ───────────────────────────────────
  ros-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: ros_monitoring_system

    environment:
    - DISPLAY=:1
    - VGL_DISPLAY=egl
    - VGL_REFRESHRATE=60
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    - ROS_DISTRO=humble
    - ROS_DOMAIN_ID=0
    - START_FOXGLOVE=true
    - START_FILEMANAGER=true

    # GPU Passthrough (NVIDIA only - /dev/dri not available on Windows)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, display, video, compute, utility]

    volumes: 
      # Mount ROS workspace
      - ../ros_ws:/root/ros_ws
      # Mount file manager web app
      - ../file_manager:/root/file_manager
      # Shared memory for ROS2
      - /dev/shm:/dev/shm

    ports:
      - "6080:6080"   # noVNC
      - "5901:5901"   # TurboVNC (for direct access if needed)
      - "8765:8765"   # Foxglove Bridge
      - "5000:5000"   # File Manager

    networks:
      - ros_network
    restart: unless-stopped

    command: sleep infinity

networks:
  ros_network:
    driver: bridge
