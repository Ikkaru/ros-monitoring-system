# ==================================================================
# ROS 2 Monitoring Service
#
# Servies:
#   ros-core → ROS 2 core services (e.g., roscore)
#
# Usage:
# docker-compose up -d
#        → ws://localhost:8765  (Foxglove)
#        → http://localhost:5000 (File Manager)
#        → GUI langsung tampil di display Linux host
# ==================================================================

services:

  # ── ROS2 Core Container ───────────────────────────────────
  ros-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: ros_monitoring_system

    environment:
    - DISPLAY=${DISPLAY}
    - ROS_DISTRO=jazzy
    - ROS_DOMAIN_ID=0
    - START_FOXGLOVE=true
    - START_FILEMANAGER=true

    volumes: 
      # Mount ROS workspace
      - ../ros_ws:/root/ros_ws
      # Mount file manager web app
      - ../file_manager:/root/file_manager
      # Shared memory for ROS2
      - /dev/shm:/dev/shm
      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix

    devices: []
    # /dev/dri ditambahkan via docker-compose.ogpu.yml untuk AMD/Intel GPU
    # NVIDIA GPU ditangani via docker-compose.nvidia.yml (NVIDIA Container Toolkit)

    ports:
      - "8765:8765"   # Foxglove Bridge
      - "5000:5000"   # File Manager

    networks:
      - ros_network
    restart: unless-stopped

networks:
  ros_network:
    driver: bridge
