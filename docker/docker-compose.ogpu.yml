# ==================================================================
# AMD/Intel GPU Override (Linux host / WSLg only)
#
# Gunakan file ini bersama docker-compose.yml jika menggunakan GPU AMD/Intel:
#
#   make up-ogpu
#   → docker compose -f docker/docker-compose.yml -f docker/docker-compose.ogpu.yml up
#
# CATATAN: /dev/dri harus tersedia di host. Tidak support di Windows host.
# Berfungsi di: Linux native & WSLg (WSL2)
# ==================================================================

services:
  ros-core:
    devices:
      - /dev/dri:/dev/dri
